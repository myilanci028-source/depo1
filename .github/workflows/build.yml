name: Build test APK

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'
      - name: Build debug APK
        run: gradle --no-daemon --stacktrace assembleDebug
      - name: Prepare named APK
        run: cp app/build/outputs/apk/debug/app-debug.apk YILANCIOGLU_BARKOD_KLAVYE_TEST_v1.apk
      - uses: actions/upload-artifact@v4
        with:
          name: YILANCIOGLU_BARKOD_KLAVYE_TEST_v1
          path: YILANCIOGLU_BARKOD_KLAVYE_TEST_v1.apk
          if-no-files-found: error
          retention-days: 30
