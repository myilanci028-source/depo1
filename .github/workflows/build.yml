name: Build test APK

on:
  push:
    branches: [barcode-keyboard-v1]
    paths-ignore:
      - 'dist/**'
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'
      - name: Build debug APK
        run: gradle --no-daemon --stacktrace assembleDebug
      - name: Publish APK into branch
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/debug/app-debug.apk dist/YILANCIOGLU_BARKOD_KLAVYE_TEST_v1.apk
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dist/YILANCIOGLU_BARKOD_KLAVYE_TEST_v1.apk
          if ! git diff --cached --quiet; then
            git commit -m "Publish test APK [skip ci]"
            git push
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: YILANCIOGLU_BARKOD_KLAVYE_TEST_v1
          path: dist/YILANCIOGLU_BARKOD_KLAVYE_TEST_v1.apk
          if-no-files-found: error
          retention-days: 30
